name: 'Terraform Pipeline.'

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential curl unzip
        
    - name: Install Terraform
      run: |
        curl -fsSL https://releases.hashicorp.com/terraform/1.6.6/terraform_1.6.6_linux_amd64.zip -o terraform.zip
        unzip terraform.zip
        sudo mv terraform /usr/local/bin/
        terraform version
        
    - name: Install Stackgen CLI
      run: |
        /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
        brew install stackgenhq/stackgen/stackgen

    - name: Export Brew Path
      run: echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
      
    - name: Stackgen Provision (Generate IaC)
      run: |
        stackgen provision \
          --appstack-id=504867b3-51f5-41a2-81c6-dfc4d25cf23f \
          --var="region=ap-south-1" \
          -e dev \
          --iac-tool terraform
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        STACKGEN_URL: ${{ secrets.STACKGEN_URL }}
        STACKGEN_TOKEN: ${{ secrets.STACKGEN_TOKEN }}

    - name: Find Terraform Directory
      id: tfdir
      run: |
        echo "TF_DIR=$(find . -type d -name terraform | head -n 1)" >> $GITHUB_ENV
        
    - name: Terraform Init
      working-directory: ${{ env.TF_DIR }}
      run: terraform init

    - name: Terraform Validate
      working-directory: ${{ env.TF_DIR }}
      run: terraform validate

    - name: Stackgen create
      run: |
        stackgen provision \
          --appstack-id=504867b3-51f5-41a2-81c6-dfc4d25cf23f \
          --var="region=ap-south-1" \
          -e dev \
          --iac-tool terraform  --apply
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
        STACKGEN_URL: ${{ secrets.STACKGEN_URL }}
        STACKGEN_TOKEN: ${{ secrets.STACKGEN_TOKEN }}
